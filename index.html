<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
        }

        .flag {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .stripe {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .saffron {
            background: #FF9933;
        }

        .white {
            background: white;
        }

        .green {
            background: #138808;
        }

        .chakra {
            width: 100px;
            height: 100px;
            border: 4px solid #000080;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000080;
            font-size: 48px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="flag">
    <div class="stripe saffron"></div>

    <div class="stripe white">
        <div class="chakra">☸</div>
    </div>

    <div class="stripe green"></div>
</div>

</body>
</html>
